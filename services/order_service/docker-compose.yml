services:
  order_service_db:
    image: postgres:latest
    networks:
      - kafka-net
    container_name: order_service_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    env_file:
      - .env
    ports:
      - "${DB_PORT}:5432"

  order_service:
    build: .
    networks:
      - kafka-net
    container_name: order_service
    restart: always
    depends_on:
      - order_service_db
    env_file:
      - .env
    ports:
      - "${PORT}:8000"
    command: >
      sh -c "sleep 5 &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:

networks:
  kafka-net:
    name: kafka-net
    driver: bridge
    external: true